schema_id: autopilot_task_queue
schema_version: 1
required:
  - task_queue
properties:
  task_queue:
    required:
      - goal_id
      - executable_tasks
      - blocked_red_items
      - next_safe_task
  executable_task:
    required:
      - id
      - lane
      - status
      - objective
      - scope
      - allowed_files_or_systems
      - forbidden_files_or_systems
      - budget_expected
      - allowed_commands_or_operations
      - validation
      - receipt_required
      - stop_conditions
    lane_enum:
      - Green
      - Amber
    status_enum:
      - todo
      - in_progress
      - done
      - blocked
