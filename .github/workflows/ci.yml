name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:all

      - name: Run release gate summary
        run: npm run gate:ci -- --json

      - name: Profile CLI smoke
        run: |
          npm run rebuild-profile -- --dry-run --json
          npm run profile-health
          npm run profile-gate -- --json --summary-only
          npm run v8-diagnose -- --query "[[checkpoint vector schema migration]] ::TagMemo+1.5"
